services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./services/init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  inventory:
    build: ./services/inventory
    ports:
      - "9001:9001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/inventory_db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9001/a2a/.well-known/agent-card.json')"]
      interval: 5s
      timeout: 3s
      retries: 5

  orders:
    build: ./services/orders
    ports:
      - "9002:9002"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/orders_db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9002/a2a/.well-known/agent-card.json')"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - INVENTORY_AGENT_URL=http://inventory:9001
      - ORDERS_AGENT_URL=http://orders:9002
    depends_on:
      inventory:
        condition: service_healthy
      orders:
        condition: service_healthy
